<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Search App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>OMDB Movie Search Project</h1>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Enter movie/series name...">
            
            
            <select id="typeFilter">
                <option value="">All Types</option>
                <option value="movie">Movie</option>
                <option value="series">Series</option>
            </select>
            
            <input type="number" id="yearFilter" placeholder="Year (e.g., 2010)" min="1900" max="2026">
            
            <button id="searchBtn">Search</button>
        </div>

        <div id="movieContainer" class="movie-container"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
